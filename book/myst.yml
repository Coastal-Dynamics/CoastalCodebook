version: 1
project:
  title: CoastalCodeBook
  authors:
    - name: The Coastal Dynamics Education Team
  copyright: 2022-2025
  github: Coastal-Dynamics/CoastalCodeBook
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - title: About this book
      children:
        - file: about/introduction.md
        - file: about/structure.md
        - file: about/overview.md
        - file: about/acknowledgements.md
    - title: Usage
      children:
        - file: usage/installation.md
        - file: usage/getting_started.md
        - file: usage/troubleshooting.md
        - file: usage/contributing.md
    - title: Week 1
      children:
        - file: 1a_tectonic_classification.ipynb
        - file: 1b_process-based_classification.ipynb
    - title: Week 2
      children:
        - file: 2a_pre_knowledge_waves.ipynb
        - file: 2b_wave_dispersion_and_grouping.ipynb
        - file: 2c_generation_tide.ipynb
        - file: 2d_tidal_constituents.ipynb
    - title: Week 3
      children:
        - file: 3a_tidal_environments.ipynb
        - file: 3b_wave_asymmetry_and_skewness.ipynb
        - file: 3c_radiation_stresses_and_wave_forces.ipynb
    - title: Week 4
      children:
        - file: 4a_bound_long_wave.ipynb
        - file: 4b_shallow_water_tides.ipynb
    - title: Week 5
      children:
        - file: 5_coastal_classification_and_beach_states.ipynb
    - title: Week 6
      children:
        - file: 6_cross_shore_transport.ipynb
    - title: Week 7
      children:
        - file: 7_alongshore_transport.ipynb
    - title: Week 8
      children:
        - file: 8a_escoffier_curve.ipynb
        - file: 8b_kreeke_robaczewska.ipynb
        - file: 8c_equillibrium_concentration.ipynb
        - file: 8d_interventions.ipynb
site:
  template: book-theme
  options:
    logo: logo.png
    folders: true
    full_width: true      # Tells the theme to use the wide layout
